appId: com.shortcut.studio
productName: ShortCut Studio
copyright: Copyright © 2026

directories:
  output: release-builds
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  - from: exe
    to: exe
    filter: ['**/*']
  # SCL_Demo worker binaries. Supervisor expects them at
  # resources/workers/ in packaged builds; resolveWorkersDir() falls
  # back to the sibling SCL_Demo/_exe path only in dev.
  - from: ../../../SCL_Demo/_exe
    to: workers
    filter:
      - root_watchdog.exe
      - topic_watchdog.exe
      - gemini_processor.exe
      - filescanner.exe
      - rescan.exe
      - postprocessing.exe

asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ShortCut Studio

publish:
  provider: generic
  url: https://example.invalid/updates/
