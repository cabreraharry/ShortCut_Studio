appId: com.shortcut.studio
productName: ShortCut Studio
copyright: Copyright © 2026

directories:
  output: release-builds
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  # Tray + window icon — loaded at runtime by tray.ts via process.resourcesPath/icon.ico.
  # Without this entry, packaged builds have no icon to load and the tray slot
  # would render blank.
  - from: resources/icon.ico
    to: icon.ico
  - from: exe
    to: exe
    filter: ['**/*']
  # SCL_Demo background workers — supervisor reads them from
  # process.resourcesPath/workers in packaged builds (config.ts:resolveWorkersDir).
  - from: ../../../SCL_Demo/_exe
    to: workers
    filter:
      - root_watchdog.exe
      - topic_watchdog.exe
      - gemini_processor.exe
      # filescanner is on-demand (spawned by main/workers/scanRunner.ts when
      # the user adds a folder), not supervised. Without this entry it would
      # be missing from <resourcesPath>/workers/ in packaged builds and
      # FoldersAdd would fire a "filescanner.exe not found" notification on
      # every add.
      - filescanner.exe
  # SCL_Demo data-root seed — copied to <userData>/scl_data/db_files/ on first
  # launch by scl-folder.ts. The supervisor sets SCL_DEMO_DATA_ROOT to that
  # path so the Python workers' resolver short-circuits to it instead of
  # walking up from sys.executable looking for an ancestor with a db_files/
  # subdir (which won't exist in the install layout).
  #
  # Bundle includes the worker-required config + privacy lists + the seed
  # SCLFolder DBs. Runtime swarm/peer state (CStat.db, mq.db, swarm.db, etc.)
  # is NOT bundled — workers create those on first run.
  - from: ../../../SCL_Demo/db_files
    to: scl_data_seed/db_files
    filter:
      - config.json
      - Support_priv_list.json
      - Ignore_publ_list.json
      - zine_mappings.json
      - SCLFolder_Publ.db
      - SCLFolder_Priv.db
  # IPFS Kubo + Nginx are NOT bundled in the payload as of v0.5.0. They're
  # required components — the web-stub installer downloads them from the
  # canonical upstream hosts (dist.ipfs.tech, nginx.org) at install time,
  # SHA-256-verifies, and extracts into resources/extras/{ipfs,nginx}. Keeps
  # the .7z payload around 50–60 MB instead of ~140 MB. See
  # docs/claude-handoff/ + .claude/plans/i-think-we-should-velvet-tide.md.
  #
  # Dev (`npm run dev`) and `build:unpack` still use scripts/fetch-vendor-
  # binaries.mjs to populate vendor/{ipfs,nginx} on disk so developers don't
  # have to round-trip through the stub.

asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**

win:
  target:
    # nsis-web produces a small ~1–2 MB stub + a separate .7z payload + a
    # .blockmap for differential updates. Stub size keeps the initial
    # download tiny; payload is downloaded on demand by the stub or
    # consumed locally if dropped next to the stub (offline / air-gap).
    - target: nsis-web
      arch: [x64]
  icon: resources/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
  signtoolOptions:
    # Surfaces in Windows SmartScreen + Properties → Details. Cleaner UX than
    # "Unknown publisher" even though the binary remains unsigned. A real
    # code-signing certificate is the only way to remove the SmartScreen warning
    # entirely; deferred until that's purchased.
    publisherName: ShortCut Studio

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ShortCut Studio
  # Block-map differential updates: the .blockmap file shipped next to the
  # .7z lets the in-app updater fetch only the changed blocks for a new
  # version instead of the full payload.
  differentialPackage: true
  # Custom NSIS hooks: web-stub manifest fetch, required-component download
  # + verify + extract pass, optional silent-installer pass, post-install
  # telemetry POST. See build/installer.nsh.
  include: build/installer.nsh

# Update channel — read by the in-app updater (Phase 4) and by the stub
# (Phase 2) when checking for new versions. The actual S3 bucket /
# CloudFront distribution is provisioned by infra/aws/ (Phase 3); this
# placeholder URL keeps electron-builder happy until then.
publish:
  provider: generic
  url: https://updates.shortcutstudio.invalid/v1/
  channel: stable
