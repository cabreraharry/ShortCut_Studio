<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCL Admin App</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:;">


  <link rel="stylesheet" href="asset/css/bootstrap.min.css">
  <!-- I prefer to use bootstrap for te following features:
          -- Modals: - creating dialog boxes or pop-ups.
          -- Dropdowns: - creating dropdown menus.
          -- Tooltips: - displaying small pop-up boxes with additional information.
          -- Popovers: - like a tooltip but with more content.
          -- Carousel: - creating potentially image sliders or tales with different statistics.
          -- Collapse: - creating collapsible/expandable content.
          -- Alerts: - creating dismissible alerts/message boxes.
          -- Tabs: - creating tabbed navigation (visually exchanging content below the action/navigation buttons above) -->

  <link rel="stylesheet" href="asset/css/all.min.css">

  <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"> -->

  <link rel="stylesheet" type="text/css" href="custom.css">

</head>

<body>
  <div class="main-window">
    <button id="quitButton" class="btn"><img src="asset/quit_small.png" alt="quit"></button>
    <div class="button-group">
      <!-- the button group that is related to select the content within table-containers (table-tabs): -->

      <div class="current-progress">
        <button class="btn" id="LLM_addBtn" data-label="Select Default LLM">Config LLMs</button>
        <button class="btn" id="PG_addBtn" data-label="">Progress</button>
        <button class="btn active" id="fetchDataButton" data-label="Add and exclude index folders:">Folders</button>
        <button class="btn" id="setDetailsButton" data-label="">Set Details</button>
      </div>
    </div>
    <div class="table-title">
      <span id="secondary-label">Add and exclude index folders:</span>
    </div>
    <div class="table-container" id="top-container">
      <div id="loader" class="text-center">
        <img src="loader.gif" alt="Loading..." height="200" width="200">
      </div>
      <table class="table table-bordered" id="resultTable">
        <tbody id="tableBody">
          <!-- the table-body contains the different tabs associated with above buttons: -->

        </tbody>
      </table>
      <div id="llm-container" class="d-none">
        <div class="providers-container" id="p-container">
          <h6>Provider</h6>
          <div class="provider-content">
            <table class="table table-bordered">
              <tbody id="llm-tableBody">
                <!-- the table-body contains the different tabs associated with above buttons: -->

              </tbody>
            </table>
          </div>
        </div>
        <div id="h-seperator"></div>
        <div class="models-container" id="m-container">
          <h6>Models</h6>
          <div id="add-model">

          </div>
          <div id="models-content">

          </div>
        </div>
      </div>
      <div id="settings-content" class="d-none p-3">
        <p>
        <h4>Edit Details</h4>
        </p>
        <div class="row">
          <div class="form-group col-md-4">
            <label for="localhost-port-input">Localhost Port</label>
            <input type="email" class="form-control" id="localhost-port-input">
            <input hidden id = "rec_id"/>
          </div>
          <div class="form-group col-md-4">
            <label for="num-topic-thold-input">NumTopicThredhold</label>
            <input type="email" class="form-control" id="num-topic-thold-input">
          </div>
          <div class="form-group col-md-4">
            <label for="cpu-t-hold-input">CPU Perf Thredhold</label>
            <input type="email" class="form-control" id="cpu-t-hold-input">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <button id = "update_admindata_btn" class="btn btn-success">Update</button>
          </div>
        </div>
      </div>
      <div class="add-item">
        <button id="addFolderButton"><img src="asset/add.svg" alt="add"
            style="margin: 0 10px; width: 24px; height: 24px;">Add/exclude Folder</button>
        <!-- this button can be shown independent of the context of above tae windows -->
      </div>
    </div>

    <div class="info-title" id = "seperator">
      <!-- <span>Here is more</span> -->
    </div>
    <div class="info-section" id="bottom-container" style="padding-top:30px;">
      <div class="d-flex" >
        <!-- Info Section Content -->
      </div>
    </div>

  </div>

  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>Path is not exists!</p>
    </div>
  </div>

  <div id="alertButton" class="d-none"></div>
  <script src="jquery-3.7.1.min.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
